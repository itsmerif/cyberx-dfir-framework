{% extends "base.html" %}

{% block content %}

<h3>Evidence Upload (Case {{ case_id }})</h3>

<form method="POST"
      action="/evidence/upload/{{ case_id }}"
      enctype="multipart/form-data">

    <input type="file" name="file" required>

    <button type="submit" class="btn btn-primary">
        Upload Evidence
    </button>

</form>

{% endblock %}
